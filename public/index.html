<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track.ly</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>Track.ly</h1>
      <p class="subtitle">Entre na sua conta</p>

      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="..." />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button id="btn-login">Entrar</button>
      <button id="btn-register" class="btn-secondary">Criar conta</button>

      <p class="error" id="error-msg" style="display: none"></p>

      <p class="switch-link">
        Não tem conta? <a href="#" id="link-register">Registre-se</a>
      </p>
    </div>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
